<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesquisa de Anterioridade — Suprema</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e11;
  --bg2:#141418;
  --bg3:#1a1a20;
  --red:#e60000;
  --red-glow:rgba(230,0,0,0.35);
  --red-soft:rgba(230,0,0,0.08);
  --red-text:#ff5555;
  --glass-bg:linear-gradient(160deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
  --glass-border:rgba(255,255,255,0.09);
  --glass-border-hi:rgba(255,255,255,0.15);
  --glass-shine:rgba(255,255,255,0.12);
  --text:#e8e8ec;
  --text2:rgba(255,255,255,0.5);
  --text3:rgba(255,255,255,0.28);
  --radius:22px;
  --radius-sm:14px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  min-height:100vh;background:var(--bg);color:var(--text);
  font-family:var(--font);line-height:1.5;overflow-x:hidden;
}

/* ── Ambient light ── */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.ambient .orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.5;animation:drift 30s ease-in-out infinite;}
.ambient .orb.r{width:500px;height:500px;top:-10%;right:-5%;background:radial-gradient(circle,rgba(230,0,0,0.1),transparent 70%);animation-delay:-5s;}
.ambient .orb.g{width:600px;height:600px;bottom:-15%;left:-10%;background:radial-gradient(circle,rgba(40,40,50,0.4),transparent 70%);animation-delay:-15s;}
.ambient .orb.w{width:400px;height:400px;top:40%;right:20%;background:radial-gradient(circle,rgba(255,255,255,0.02),transparent 70%);animation-delay:-10s;}
@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1);}
  25%{transform:translate(40px,-30px) scale(1.08);}
  50%{transform:translate(-20px,40px) scale(0.95);}
  75%{transform:translate(30px,20px) scale(1.03);}
}

/* ── Grain texture ── */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:0.4;
}

.page{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 20px;}

/* ══════ GLASS SYSTEM ══════ */
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(24px) saturate(1.2);
  -webkit-backdrop-filter:blur(24px) saturate(1.2);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  box-shadow:
    0 0 0 0.5px rgba(255,255,255,0.04),
    0 8px 40px rgba(0,0,0,0.35),
    inset 0 0.5px 0 var(--glass-shine);
  position:relative;
  overflow:hidden;
}
.glass::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.12) 30%,rgba(255,255,255,0.12) 70%,transparent 100%);
  pointer-events:none;
}
.glass-sm{
  background:linear-gradient(160deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:var(--radius-sm);
  box-shadow:0 4px 20px rgba(0,0,0,0.2),inset 0 0.5px 0 rgba(255,255,255,0.06);
  position:relative;
}

/* ══════ HEADER ══════ */
.header{
  padding:48px 0 0;display:flex;flex-direction:column;align-items:center;gap:16px;
  animation:emerge 0.8s cubic-bezier(0.16,1,0.3,1);
}
@keyframes emerge{from{opacity:0;transform:translateY(-20px) scale(0.97);}to{opacity:1;transform:none;}}
.header-logo{
  width:56px;height:56px;border-radius:16px;overflow:hidden;
  box-shadow:0 4px 24px var(--red-glow), 0 0 0 1px rgba(255,255,255,0.08);
  transition:transform 0.3s ease;
}
.header-logo:hover{transform:scale(1.05);}
.header-logo img{width:100%;height:100%;object-fit:cover;}
.header-title{
  font-size:16px;font-weight:600;color:rgba(255,255,255,0.7);
  letter-spacing:3px;text-transform:uppercase;text-align:center;
}
.header-sub{font-size:12px;color:var(--text3);margin-top:-8px;letter-spacing:0.5px;}

/* ══════ SEARCH HERO ══════ */
.search-hero{
  margin-top:32px;padding:0;
  animation:emerge 0.8s cubic-bezier(0.16,1,0.3,1) 0.15s both;
}
.search-inner{padding:28px 28px 22px;}
.search-label{
  font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;display:block;
}
.search-input{
  width:100%;background:rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.05);border-radius:16px;
  padding:16px 20px;color:#fff;font-size:16px;line-height:1.6;
  resize:none;font-family:var(--font);outline:none;
  transition:all 0.3s ease;font-weight:400;
}
.search-input::placeholder{color:rgba(255,255,255,0.18);font-weight:300;}
.search-input:focus{
  border-color:rgba(230,0,0,0.25);
  box-shadow:0 0 0 4px rgba(230,0,0,0.06),0 0 24px rgba(230,0,0,0.05);
}
.search-actions{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:16px;flex-wrap:wrap;gap:10px;
}
.search-hint{font-size:11px;color:var(--text3);letter-spacing:0.3px;font-weight:400;}
.btn-search{
  padding:12px 28px;border-radius:14px;border:none;
  background:linear-gradient(135deg,#e60000 0%,#c00 100%);
  color:white;font-size:13px;font-weight:700;cursor:pointer;
  font-family:var(--font);letter-spacing:0.5px;
  box-shadow:0 4px 20px var(--red-glow),0 0 0 0.5px rgba(255,100,100,0.15);
  transition:all 0.3s ease;text-transform:uppercase;
}
.btn-search:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--red-glow),0 0 0 0.5px rgba(255,100,100,0.2);}
.btn-search:active{transform:translateY(0);}
.btn-search:disabled{opacity:0.3;cursor:default;transform:none;box-shadow:none;}

/* ══════ TABS ══════ */
.tab-row{
  display:flex;gap:3px;padding:4px;width:fit-content;margin:28px auto 0;
  animation:emerge 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s both;
}
.tab{
  padding:10px 22px;border-radius:12px;border:none;font-size:13px;font-weight:600;
  cursor:pointer;transition:all 0.3s;background:transparent;color:var(--text3);
  font-family:var(--font);letter-spacing:0.3px;
}
.tab:hover:not(.on){color:var(--text2);}
.tab.on{
  background:linear-gradient(135deg,rgba(230,0,0,0.18),rgba(230,0,0,0.06));
  color:var(--red-text);border:1px solid rgba(230,0,0,0.15);
  box-shadow:0 2px 12px rgba(230,0,0,0.1);
}

/* ══════ RESULTS ══════ */
.results-area{animation:emerge 0.5s cubic-bezier(0.16,1,0.3,1);}
.sec-label{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;
  margin:28px 0 14px;display:flex;align-items:center;gap:10px;
}
.sec-dot{width:6px;height:6px;border-radius:50%;box-shadow:0 0 10px currentColor,0 0 3px currentColor;}
.cls-card{padding:18px 20px;margin-bottom:10px;}
.cls-head{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.cls-num{font-size:24px;font-weight:800;line-height:1;letter-spacing:-0.5px;}
.cls-name{font-size:12px;color:var(--text2);font-weight:500;}
.cls-badge{
  font-size:9px;font-weight:700;letter-spacing:0.5px;
  background:var(--red-soft);color:var(--red-text);
  padding:3px 10px;border-radius:8px;border:1px solid rgba(230,0,0,0.1);
}
.cls-btns{display:flex;gap:6px;flex-shrink:0;}
.cls-btn{
  width:32px;height:32px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);
  background:rgba(0,0,0,0.2);color:var(--text3);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:var(--font);
  transition:all 0.2s;
}
.cls-btn:hover{background:rgba(255,255,255,0.04);color:var(--text2);border-color:rgba(255,255,255,0.1);}

/* ── Spec items ── */
.specs{margin-top:12px;}
.sel-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;padding:0 4px;}
.sel-btn{
  font-size:10px;color:var(--red-text);cursor:pointer;font-weight:700;
  background:none;border:none;font-family:var(--font);
  padding:4px 10px;border-radius:8px;transition:all 0.2s;
  letter-spacing:0.5px;text-transform:uppercase;
}
.sel-btn:hover{background:var(--red-soft);}
.sp{
  padding:9px 14px;background:rgba(0,0,0,0.15);border:1px solid transparent;
  border-radius:12px;font-size:13px;color:var(--text2);line-height:1.4;
  margin-bottom:3px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all 0.25s ease;user-select:none;
}
.sp:hover{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.04);color:var(--text);}
.sp .ck{
  width:22px;height:22px;border-radius:8px;flex-shrink:0;
  border:2px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.25s ease;font-size:12px;color:transparent;
  background:rgba(0,0,0,0.1);
}
.sp.on{background:rgba(230,0,0,0.04);border-color:rgba(230,0,0,0.1);color:var(--text);}
.sp.on .ck{
  border-color:var(--red);background:linear-gradient(135deg,rgba(230,0,0,0.4),rgba(230,0,0,0.2));
  color:#fff;box-shadow:0 0 12px rgba(230,0,0,0.2),0 0 4px rgba(230,0,0,0.3);
}
.sp .st{flex:1;}


/* ── Parecer Generator ── */
.parecer-tpl-btn{
  background:var(--glass-bg);border:1px solid var(--border);color:var(--text2);
  border-radius:10px;padding:8px 15px;cursor:pointer;font-size:12px;
  font-family:var(--font);transition:all 0.15s;
}
.parecer-tpl-btn:hover{color:var(--text);border-color:var(--accent);}
.parecer-tpl-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.parecer-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;}
.parecer-cl-num{width:70px!important;flex-shrink:0;}
.parecer-remove{background:none;border:none;color:#ff4444;cursor:pointer;font-size:16px;padding:4px 6px;line-height:1;align-self:center;flex-shrink:0;}
.parecer-remove:hover{color:#ff0000;}

/* ── Email output ── */
.email-card{padding:24px;margin-top:24px;}
.email-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.email-title{font-size:12px;font-weight:700;color:var(--text);letter-spacing:0.5px;}
.btn-copy{
  padding:10px 22px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#e60000,#c00);color:white;
  font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);
  box-shadow:0 4px 16px var(--red-glow);transition:all 0.3s;letter-spacing:0.5px;
}
.btn-copy:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--red-glow);}
.btn-copy.ok{background:linear-gradient(135deg,#059669,#047857);box-shadow:0 4px 16px rgba(5,150,105,0.3);}
.email-output{
  background:rgba(0,0,0,0.25);border-radius:14px;padding:18px;
  font-size:11px;line-height:1.8;color:rgba(255,255,255,0.65);
  white-space:pre-wrap;font-family:Tahoma,Geneva,sans-serif;
  max-height:400px;overflow:auto;border:1px solid rgba(255,255,255,0.03);
}

/* ── Browse ── */
.browse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:6px;}
.browse-grid button{
  padding:11px 4px;border-radius:12px;border:1px solid rgba(255,255,255,0.04);
  background:rgba(0,0,0,0.2);color:var(--text3);font-size:14px;font-weight:700;
  cursor:pointer;transition:all 0.25s;font-family:var(--font);
}
.browse-grid button:hover{border-color:rgba(255,255,255,0.08);color:var(--text2);background:rgba(255,255,255,0.02);}
.browse-grid button.on{
  border-color:rgba(230,0,0,0.35);background:linear-gradient(135deg,rgba(230,0,0,0.12),rgba(230,0,0,0.04));
  color:var(--red-text);box-shadow:0 2px 16px rgba(230,0,0,0.12);
}
.browse-filter{
  background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;padding:10px 16px;color:#fff;font-size:13px;
  font-family:var(--font);outline:none;width:200px;transition:all 0.3s;
}
.browse-filter::placeholder{color:rgba(255,255,255,0.15);}
.browse-filter:focus{border-color:rgba(230,0,0,0.2);box-shadow:0 0 0 3px rgba(230,0,0,0.05);}

.empty{padding:48px;text-align:center;color:var(--text3);font-size:14px;margin-top:20px;}
.hidden{display:none;}
footer{padding:56px 0 32px;text-align:center;font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15);}

@media(max-width:600px){
  .header{padding-top:32px;}
  .header-title{font-size:13px;letter-spacing:2px;}
  .search-inner{padding:20px;}
  .search-input{font-size:15px;padding:14px 16px;}
  .cls-num{font-size:20px;}
}

  .preset-cat-btn{
    padding:16px 12px;border-radius:14px;border:1px solid rgba(255,255,255,0.04);
    background:rgba(0,0,0,0.2);color:var(--text2);cursor:pointer;
    transition:all 0.25s;font-family:var(--font);text-align:center;
  }
  .preset-cat-btn:hover{border-color:rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);}
  .preset-cat-btn.active{
    border-color:rgba(230,0,0,0.35);background:linear-gradient(135deg,rgba(230,0,0,0.12),rgba(230,0,0,0.04));
    color:var(--red-text);box-shadow:0 2px 16px rgba(230,0,0,0.12);
  }
  .preset-biz-btn{
    padding:10px 18px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);
    background:rgba(0,0,0,0.15);color:var(--text2);cursor:pointer;
    transition:all 0.25s;font-family:var(--font);font-size:13px;font-weight:500;
  }
  .preset-biz-btn:hover{border-color:rgba(255,255,255,0.1);color:var(--text);}
  .preset-biz-btn.active{
    border-color:rgba(230,0,0,0.3);background:rgba(230,0,0,0.08);
    color:var(--red-text);font-weight:600;
  }

</style>
</head>

function searchClasses(query){
  const q = norm(query);
  const words = q.split(" ").filter(w => w.length > 2);
  
  // 1. Detect ACTION context
  let detectedActions = [];
  let avoidClasses = new Set();
  let boostClasses = new Set();
  
  for(const [action, config] of Object.entries(ACTION_CLASS_MAP)){
    if(q.includes(action)){
      detectedActions.push(action);
      config.main.forEach(c => boostClasses.add(c));
      config.avoid.forEach(c => avoidClasses.add(c));
    }
  }
  
  // 2. Detect OBJECT context  
  let detectedObjects = [];
  for(const [obj, classes] of Object.entries(OBJECT_CLASS_MAP)){
    if(words.some(w => obj.includes(w) || w.includes(obj))){
      detectedObjects.push(obj);
    }
  }
  
  // 3. Score classes by matching specs against the FULL query
  const classScores = {};
  
  for(const [cl, specs] of Object.entries(SP)){
    const clNum = parseInt(cl);
    let classScore = 0;
    let matchedSpecs = [];
    
    for(const spec of specs){
      const ns = norm(spec);
      let specScore = 0;
      
      // Check how many query words match this spec
      for(const w of words){
        if(ns.includes(w)) specScore += 3;
      }
      
      // Bonus: multi-word phrase match
      if(q.length > 6 && ns.includes(q)) specScore += 20;
      
      // Check 2-word combos from query
      for(let i = 0; i < words.length - 1; i++){
        const combo = words[i] + " " + words[i+1];
        if(ns.includes(combo)) specScore += 8;
      }
      
      if(specScore > 0){
        matchedSpecs.push({spec, score: specScore});
        classScore += specScore;
      }
    }
    
    if(classScore > 0){
      // Apply action context: boost or penalize
      if(boostClasses.has(clNum)) classScore *= 2.5;
      if(avoidClasses.has(clNum)) classScore *= 0.2;
      
      classScores[clNum] = {
        score: classScore,
        matchedSpecs: matchedSpecs.sort((a,b) => b.score - a.score).map(s => s.spec)
      };
    }
  }
  
  // 4. Also use keyword map for broader matching
  for(const [kw, cls] of Object.entries(KW)){
    const nk = norm(kw);
    if(words.some(w => nk.includes(w) || w.includes(nk)) || q.includes(nk)){
      cls.forEach((c, i) => {
        let kwScore = Math.max(10 - i * 2, 2);
        if(boostClasses.has(c)) kwScore *= 2;
        if(avoidClasses.has(c)) kwScore *= 0.15;
        
        if(!classScores[c]) classScores[c] = {score: 0, matchedSpecs: []};
        classScores[c].score += kwScore;
      });
    }
  }
  
  // 5. For object-class complementary: add product classes with lower score
  for(const obj of detectedObjects){
    const objClasses = OBJECT_CLASS_MAP[obj] || [];
    for(const c of objClasses){
      if(!classScores[c]) classScores[c] = {score: 0, matchedSpecs: []};
      // Only small boost — these are complementary
      if(!boostClasses.has(c)){
        classScores[c].score += 2;
      }
    }
  }
  
  // 6. For ALL classes with no matchedSpecs, filter specs by query relevance
  // This prevents showing ALL 200+ specs when a class was found via KW map
  for(const [cl, data] of Object.entries(classScores)){
    if(data.matchedSpecs.length === 0){
      const specs = SP[parseInt(cl)] || [];
      const relevant = [];
      for(const spec of specs){
        const ns = norm(spec);
        let match = false;
        // Check if any query word appears in spec
        for(const w of words){
          if(w.length > 3 && ns.includes(w)){ match = true; break; }
        }
        // Also check the KW terms that triggered this class
        if(!match){
          for(const [kw, cls] of Object.entries(KW)){
            if(cls.includes(parseInt(cl))){
              const nk = norm(kw);
              if(words.some(w => nk.includes(w) || w.includes(nk)) || q.includes(nk)){
                // This KW triggered this class - check if KW relates to spec
                const kwParts = nk.split(' ');
                for(const kp of kwParts){
                  if(kp.length > 3 && ns.includes(kp)){ match = true; break; }
                }
                if(match) break;
              }
            }
          }
        }
        if(match) relevant.push(spec);
      }
      data.matchedSpecs = relevant;
    }
  }

  // 7. Sort and split into main/complementary
  const sorted = Object.entries(classScores)
    .map(([c, d]) => ({classe: parseInt(c), ...d}))
    .filter(c => c.score > 1)
    .sort((a, b) => b.score - a.score);
  
  const maxScore = sorted[0]?.score || 0;
  const threshold = maxScore * 0.3;
  
  return {
    main: sorted.filter(c => c.score >= threshold).slice(0, 6),
    comp: sorted.filter(c => c.score < threshold && c.score > 1).slice(0, 6)
  };
}

var currentResults=null;
var selectedSpecs={};
var currentQuery="";
var collapsedClasses=new Set();

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((b,i)=>{
    const tabIds=['search','browse','presets','parecer'];
    b.classList.toggle('on',tabIds[i]===tab);
  });
  document.getElementById('tab-search').classList.toggle('hidden',tab!=='search');
  document.getElementById('tab-browse').classList.toggle('hidden',tab!=='browse');
  document.getElementById('tab-presets').classList.toggle('hidden',tab!=='presets');
  document.getElementById('tab-parecer').classList.toggle('hidden',tab!=='parecer');
}

function doSearch(){
  const q=document.getElementById('query').value.trim();
  if(!q)return;
  currentQuery=q;
  const{main,comp}=searchClasses(q);
  currentResults={main,comp};
  // Keep existing selections, only init new classes
  [...main,...comp].forEach(c=>{
    if(!selectedSpecs[c.classe]) selectedSpecs[c.classe]=new Set();
  });
  renderResults();
}

function renderResults(){
  const r=currentResults;
  if(!r){document.getElementById('results').innerHTML='';return;}
  let html='';
  if(r.main.length===0&&r.comp.length===0){
    html='<div class="empty">Nenhuma classe encontrada. Tente descrever o negócio com mais detalhes.</div>';
  } else {
    if(r.main.length>0) html+=renderSection('Classes Principais','#e60000',r.main);
    if(r.comp.length>0) html+=renderSection('Classes Complementares','#ff8800',r.comp);
    html+=renderEmailBlock();
  }
  document.getElementById('results').innerHTML=html;
}

function renderSection(title,color,items){
  var h='<div class="sec-label" style="color:'+color+'"><span class="sec-dot" style="background:'+color+'"></span>'+title+'</div>';
  items.forEach(function(c){
    var specs=c.matchedSpecs&&c.matchedSpecs.length>0?c.matchedSpecs:(SP[c.classe]||[]);
    var selSet=selectedSpecs[c.classe]||new Set();
    var selCount=selSet.size;
    var isCollapsed=collapsedClasses.has(c.classe);
    var badgeHtml=selCount>0?'<span class="cls-badge">'+selCount+' selecionada'+(selCount>1?'s':'')+'</span>':'';
    h+='<div class="cls-card glass-sm">';
    h+='<div class="cls-head">';
    h+='<div style="flex:1"><div style="display:flex;align-items:center;gap:10px">';
    h+='<span class="cls-num" style="color:'+color+'">'+c.classe+'</span>';
    h+='<span class="cls-name">'+CT[c.classe]+'</span>';
    h+=badgeHtml;
    h+='</div></div>';
    h+='<div class="cls-btns">';
    h+='<button class="cls-btn" onclick="toggleCard(this,'+c.classe+')" title="Expandir/recolher">'+(isCollapsed?'+':'\u2212')+'</button>';
    h+='</div></div>';
    h+='<div class="specs" style="'+(isCollapsed?'display:none':'')+'">';
    h+='<div class="sel-row">';
    h+='<button class="sel-btn" onclick="selectAll('+c.classe+',true)">Selecionar todas</button>';
    h+='<button class="sel-btn" onclick="selectAll('+c.classe+',false)">Limpar</button>';
    h+='</div>';
    specs.forEach(function(s){
      var on=selSet.has(s);
      var escaped=s.replace(/"/g,'&quot;');
      h+='<div class="sp '+(on?'on':'')+'" onclick="toggleSpec('+c.classe+',this)" data-spec="'+escaped+'">';
      h+='<div class="ck">'+(on?'\u2713':'')+'</div>';
      h+='<span class="st">'+s+'</span>';
      h+='</div>';
    });
    h+='</div></div>';
  });
  return h;
}

function renderEmailBlock(){
  // Build email from ALL selectedSpecs (persists across searches)
  const lines=[];
  const allClassNums=Object.keys(selectedSpecs).map(Number).sort((a,b)=>a-b);
  allClassNums.forEach(cl=>{
    const selSet=selectedSpecs[cl];
    if(!selSet||selSet.size===0)return;
    const specs=[...(SP[cl]||[])].filter(s=>selSet.has(s));
    if(specs.length>0) lines.push('Classe '+cl+': '+specs.join('; '));
  });
  if(lines.length===0)return'<div id="search-email-area"></div>';
  return'<div id="search-email-area" class="glass" style="padding:24px;margin-top:20px;">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">'+
    '<span class="email-title">Texto para o email da pesquisa</span>'+
    '<div style="display:flex;gap:8px;">'+
    '<button class="sel-btn" onclick="clearAllSelections()" style="color:rgba(255,255,255,0.4);">Limpar tudo</button>'+
    '<button class="btn-copy" onclick="copyEmail()">Copiar tudo</button>'+
    '</div></div>'+
    '<pre class="email-output" id="email-text">'+lines.join('\n')+'</pre></div>';
}

function toggleSpec(cl,el){
  const spec=el.getAttribute('data-spec');
  if(!selectedSpecs[cl])selectedSpecs[cl]=new Set();
  if(selectedSpecs[cl].has(spec)){selectedSpecs[cl].delete(spec);el.classList.remove('on');el.querySelector('.ck').textContent='';}

var SUPABASE_URL = 'https://anqhocaqmzxprpmjyrpr.supabase.co';

var customPresets = []; // loaded from Supabase
var allCategories = {}; // merged: embedded + custom

function supaFetch(path, options){
  options = options || {};
  options.headers = options.headers || {};
  options.headers['apikey'] = SUPABASE_KEY;
  options.headers['Authorization'] = 'Bearer ' + SUPABASE_KEY;
  options.headers['Content-Type'] = 'application/json';
  options.headers['Prefer'] = options.prefer || 'return=representation';
  return fetch(SUPABASE_URL + '/rest/v1' + path, options);
}

function loadCustomPresets(){
  return supaFetch('/custom_presets?order=categoria,ramo')
    .then(function(r){ return r.json(); })
    .then(function(data){
      customPresets = data || [];
      mergeAllPresets();
      renderPresetCategories();
    })
    .catch(function(e){
      console.log('Supabase offline, usando apenas presets embutidos');
      mergeAllPresets();
      renderPresetCategories();
    });
}

function mergeAllPresets(){
  allCategories = {};
  // 1. Add all 45 Nice classes as base categories (in order)
  for(var key in PRESETS){
    var cat = PRESETS[key];
    allCategories[key] = {num: cat.num, name: cat.name, fullName: cat.fullName, icon: cat.icon, businesses: [], source: 'embedded'};
    var _hidden={};try{_hidden=JSON.parse(localStorage.getItem('nicehidden')||'{}');}catch(e){}
    cat.businesses.forEach(function(biz){
      if(!_hidden[key+'::'+biz.name])
        allCategories[key].businesses.push({name: biz.name, classes: biz.classes, source: 'embedded'});
    });
  }
  // 2. Add custom presets from Supabase — map categoria to a class key
  customPresets.forEach(function(p){
    var targetKey = null;
    // 1st: direct key match (new format: "cl43")
    if(allCategories[p.categoria]){
      targetKey = p.categoria;
    }
    // 2nd: extract digits and build key (handles "Classe 43", "43", "cl43")
    if(!targetKey){
      var m = String(p.categoria).match(/(\d+)/);
      if(m){
        var clKey = 'cl' + parseInt(m[1]);
        if(allCategories[clKey]) targetKey = clKey;
      }
    }
    // 3rd: match by display name (legacy entries)
    if(!targetKey){
      for(var k in allCategories){
        if(allCategories[k].name === p.categoria || allCategories[k].fullName === p.categoria){
          targetKey = k; break;
        }
      }
    }
    if(!targetKey) return; // skip unrecognised entries — never create a loose bucket
    allCategories[targetKey].businesses.push({
      name: p.ramo,
      classes: p.classes,
      source: 'custom',
      id: p.id
    });
  });
}

function parseSpecsText(text){
  var classes = [];
  text.split('\n').forEach(function(line){
    line = line.trim();
    if(!line) return;
    var match = line.match(/^Classe\s*(\d+)\s*:\s*(.+)$/i);
    if(match){
      var cl = parseInt(match[1]);
      var specs = match[2].split(';').map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; });
      if(specs.length > 0) classes.push({classe: cl, specs: specs});
    }
  });
  return classes;
}

function showPresetError(msg){
  var el = document.getElementById('pf-error');
  if(el){ el.textContent = msg; el.style.display = 'block'; }
}

function savePreset(editId){
  var cat = document.getElementById('pf-cat').value;
  var ramo = document.getElementById('pf-ramo').value.trim();
  var specsText = document.getElementById('pf-specs').value;
  var errEl = document.getElementById('pf-error');
  if(errEl) errEl.style.display = 'none';
  if(!cat || !ramo || !specsText.trim()){
    showPresetError('Preencha todos os campos.');
    return;
  }
  var classes = parseSpecsText(specsText);
  if(classes.length === 0){
    showPresetError('Formato inválido. Use: Classe XX: spec1; spec2; spec3');
    return;
  }
  // Validate duplicate ramo (only on insert, or if ramo name changed on edit)
  if(!editId){
    var catObj = allCategories[cat];
    if(catObj){
      var duplicate = catObj.businesses.some(function(b){
        if(_pendingHideKey && b.source !== 'custom' && cat+'::'+b.name === _pendingHideKey) return false;
        return b.name.trim().toLowerCase() === ramo.toLowerCase();
      });
      if(duplicate){
        showPresetError('Este ramo já existe nesta categoria.');
        return;
      }
    }
  }
  var body = JSON.stringify({categoria: cat, ramo: ramo, classes: classes});
  if(editId){
    // UPDATE
    supaFetch('/custom_presets?id=eq.' + editId, {method:'PATCH', body: body})
      .then(function(r){ return r.json(); })
      .then(function(){
        cancelPresetForm();
        loadCustomPresets();
      })
      .catch(function(e){ alert('Erro ao salvar. Verifique a conexão.'); });
  } else {
    // INSERT
    supaFetch('/custom_presets', {method:'POST', body: body})
      .then(function(r){ return r.json(); })
      .then(function(){
        if(_pendingHideKey){
          var hidden={};try{hidden=JSON.parse(localStorage.getItem('nicehidden')||'{}');}catch(e){}
          hidden[_pendingHideKey]=true;
          localStorage.setItem('nicehidden',JSON.stringify(hidden));
          _pendingHideKey=null;
        }
        cancelPresetForm();
        loadCustomPresets();
      })
      .catch(function(e){ alert('Erro ao salvar. Verifique a conexão.'); });
  }
}

var _pendingHideKey = null;

function deleteEmbeddedPreset(catKey, bizName){
  if(!confirm('Tem certeza que deseja excluir este ramo?')) return;
  var hidden={};try{hidden=JSON.parse(localStorage.getItem('nicehidden')||'{}');}catch(e){}
  hidden[catKey+'::'+bizName]=true;
  localStorage.setItem('nicehidden',JSON.stringify(hidden));
  mergeAllPresets();
  renderPresetCategories();
  var pb=document.getElementById('preset-businesses');
  if(pb) pb.classList.add('hidden');
  document.getElementById('preset-results').innerHTML='';
}

function editPreset(catKey, bizIdx){
  var biz = allCategories[catKey] && allCategories[catKey].businesses[bizIdx];
  if(!biz) return;
  if(biz.source === 'custom'){
    // Edit existing Supabase preset
    var preset = customPresets.find(function(p){ return p.id === biz.id; });
    if(preset) showAddPresetForm(preset);
  } else {
    // Embedded preset: open form pre-filled so user can save a custom variant
    _pendingHideKey = catKey + '::' + biz.name;
    showAddPresetForm({categoria: catKey, ramo: biz.name, classes: biz.classes, id: null});
  }
}

function deletePreset(id){

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 NAMING OFFLINE v3 \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
(function(){

// \u2500\u2500 Utilit\u00e1rios \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
var VOGAIS = 'aeiouy';
function isV(c){ return VOGAIS.indexOf((c||'').toLowerCase()) >= 0; }
function desnorm(s){ return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }
function norm(s){ return desnorm(s).toLowerCase().replace(/[^a-z0-9 ]/g,''); }
function cap(s){ if(!s) return ''; s=s.toLowerCase(); return s.charAt(0).toUpperCase()+s.slice(1); }
function limpar(s){ return desnorm(s).toLowerCase().replace(/[^a-z]/g,''); }

// \u2500\u2500 Silabificador brasileiro \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function silabas(str){
  var w = desnorm(str).toLowerCase().replace(/[^a-z]/g,'');
  if(!w) return [];
  var res=[], i=0;
  while(i < w.length){
    var sil='', nc=0;
    while(i<w.length && !isV(w[i]) && nc<3){
      sil+=w[i++]; nc++;
      if(nc===2 && i<w.length && !isV(w[i]) && 'lr'.indexOf(w[i])<0) break;
    }
    var nv=0;
    while(i<w.length && isV(w[i]) && nv<2){ sil+=w[i++]; nv++; }
    if(!nv){ if(sil) res.push(sil); break; }
    if(i<w.length && !isV(w[i]) && (i+1>=w.length || !isV(w[i+1]))){ sil+=w[i++]; }
    if(sil) res.push(sil);
  }
  return res.length ? res : [w.slice(0,4)];
}

// \u2500\u2500 Extrair \u00e2ncoras tipadas do nome \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function extrairAncoras(nomeNorm){
  var words = nomeNorm.split(/\s+/).filter(Boolean);
  var anchors = [];
  words.forEach(function(w){
    if(w.length < 2) return;
    var sils = silabas(w);
    anchors.push({texto: w, peso: 10, tipo: 'full'});
    if(sils.length >= 2){
      var p2 = sils[0]+sils[1];
      if(p2.length >= 2) anchors.push({texto: p2, peso: 9, tipo: 'prefix'});
    }
    if(sils.length >= 1 && sils[0].length >= 2){
      anchors.push({texto: sils[0], peso: 7, tipo: 'prefix'});
    }
    if(sils.length >= 1 && sils[sils.length-1].length >= 2){
      anchors.push({texto: sils[sils.length-1], peso: 8, tipo: 'suffix'});
    }
    if(sils.length >= 2){
      var s2 = sils[sils.length-2]+sils[sils.length-1];
      if(s2.length >= 3) anchors.push({texto: s2, peso: 6, tipo: 'suffix'});
    }
  });
  anchors.sort(function(a,b){ return b.peso-a.peso; });
  var seen={};
  return anchors.filter(function(a){ if(seen[a.texto]) return false; seen[a.texto]=true; return true; });
}
function getPrefAnc(anchors){
  return anchors.filter(function(a){ return a.tipo==='prefix'&&a.texto.length>=2; })[0] || anchors[0];
}
function getSufAnc(anchors){
  return anchors.filter(function(a){ return a.tipo==='suffix'&&a.texto.length>=2; })[0] || anchors[anchors.length-1];
}

function detectarSegmento(s){
  var n=norm(s), best=null, bestScore=0;

}

// \u2500\u2500 Filtros \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function validar(s){
  if(!s) return false;
  var w=limpar(s);
  if(w.length<5||w.length>10) return false;
  if(/[^aeiouy]{3,}/.test(w)) return false;
  return true;
}

// \u2500\u2500 T1 \u2013 Fus\u00e3o: prefixo do nome + palavra do segmento relevante \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function t1_fusao(anchors, seg, segRaw){
  var pref=getPrefAnc(anchors);
  if(!pref) return null;
  var words=SEMANTICO[seg]||SEMANTICO['geral'];
  var segN=norm(segRaw||'');
  var takeLen=Math.max(3, 8-pref.texto.length);
  // Prefer semantic words that appear literally in the segment input
  var i;
  for(i=0;i<words.length;i++){
    var w=limpar(words[i]);
    if(w===pref.texto||w.length<4) continue;
    if(segN.indexOf(w.slice(0,Math.min(w.length,6)))>=0){
      var cand=pref.texto+w.slice(0,takeLen);
      if(validar(cand)) return cap(cand);
    }
  }
  // Fallback: first valid combo
  for(i=0;i<words.length;i++){
    var w2=limpar(words[i]);
    if(w2===pref.texto||w2.length<4) continue;
    var cand2=pref.texto+w2.slice(0,takeLen);
    if(validar(cand2)) return cap(cand2);
  }
  return null;
}

// \u2500\u2500 T2 \u2013 Refer\u00eancia Geogr\u00e1fica: prefixo geogr\u00e1fico (2 s\u00edlabas) + \u00e2ncora de sufixo \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function t2_geo(anchors, seg, cidRaw){
  var suf=getSufAnc(anchors);
  if(!suf||!cidRaw) return null;
  var geoWords=geocidade(cidRaw);
  for(var i=0;i<geoWords.length;i++){
    var gw=limpar(geoWords[i]);
    var sils=silabas(gw);
    var pref='';
    if(sils.length>=2) pref=sils[0]+sils[1];
    else if(sils.length===1) pref=sils[0];
    else pref=gw.slice(0,4);
    var cand=pref+suf.texto;
    if(validar(cand)&&cand.toLowerCase()!==suf.texto) return cap(cand);
  }
  return null;
}

// \u2500\u2500 T3 \u2013 Composto Sem\u00e2ntico: prefixo semA (2 s\u00edlabas) + raiz semB (3 chars) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function t3_semantico(anchors, seg){
  var words=SEMANTICO[seg]||SEMANTICO['geral'];
  for(var i=0;i<words.length-1;i++){
    for(var j=i+1;j<words.length;j++){
      var wA=limpar(words[i]);
      var wB=limpar(words[j]);
      var silsA=silabas(wA);
      var prefA=(silsA.length>=2)?silsA[0]+silsA[1]:(silsA[0]||wA.slice(0,4));
      var rootB=wB.slice(0,3);
      var cand=prefA+rootB;
      if(validar(cand)) return cap(cand);
    }
  }
  return null;
}

// \u2500\u2500 T4 \u2013 Sufixac\u0327a\u0303o: \u00e2ncora de prefixo + sufixo intencional \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function t4_sufixacao(anchors, seg){
  var pref=getPrefAnc(anchors);
  if(!pref) return null;
  var sufList=SUF_INTENT[seg]||SUF_INTENT['geral'];
  for(var i=0;i<sufList.length;i++){
    var cand=pref.texto+sufList[i];
    if(validar(cand)) return cap(cand);
  }
  return null;
}

// \u2500\u2500 T5 \u2013 Raiz Moderna: \u00e2ncora de sufixo + sufixo moderno/abstrato \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function t5_moderno(anchors, seg){
  var suf=getSufAnc(anchors);
  if(!suf) return null;
  var sufList=SUF_MODERN[seg]||SUF_MODERN['geral'];
  for(var i=0;i<sufList.length;i++){
    var cand=suf.texto+sufList[i];
    if(validar(cand)) return cap(cand);
  }
  return null;
}

window.doNaming = function(){
  var nomeRaw = (document.getElementById('nm-name')  ||{value:''}).value||'';
  var segRaw  = (document.getElementById('nm-seg')   ||{value:''}).value||'';

      '<p style="color:var(--red-text);text-align:center;padding:20px;">Preencha pelo menos o nome desejado ou o segmento.</p>';

  var anchors = nomeN ? extrairAncoras(nomeN) : [];
  var seg     = detectarSegmento(segN);

  if(resultados.length===0){
    html+='<p style="color:var(--text-muted);text-align:center;">Nenhuma sugest\u00e3o gerada. Tente outros dados.</p>';
  } else {
    html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;">';

      html+='<span style="font-size:0.75rem;color:var(--text-muted);">'+r.desc+'</span>';
      html+='</div>';
    });
    html+='</div>';
  }
  html+='</div>';

};

window.copiarNome = function(btn, nome){

};

  document.querySelectorAll('#parecer-sug-list .parecer-row').forEach(function(row){

    buildFundamentos() + buildImportante(false) + buildFooterComAnt();
}

function tpl_inviavel(marca, ct, ch, ah, obs){
  return buildIntro(marca) +
    p('Durante a pesquisa foram localizados registros contendo expressões semelhantes à marca pretendida.') +
    p('Entre as anterioridades identificadas, destacamos:') + ah +
    p('Os relatórios completos das marcas encontradas seguem em anexo para análise.') +
    sec('ANÁLISE TÉCNICA') +
    p('A existência dessas marcas não impede automaticamente o pedido de registro, porém indica que o INPI poderá realizar uma análise mais criteriosa do pedido, avaliando o grau de semelhança entre os sinais.') +
    p('Após análise das anterioridades identificadas, verificamos que há registros com alto grau de semelhança com a marca pretendida no mesmo segmento de atividade, o que representa um risco elevado de indeferimento durante o exame realizado pelo INPI.') +
    sec('ESTRATÉGIA SUGERIDA') +
    p('Recomendamos que o pedido de registro seja realizado na '+c(ct)+', utilizando a(s) seguinte(s) especificação(ões) exata(s):') +
    ch + '<br>' +
    p('Diante das anterioridades identificadas, recomendamos que o cliente avalie a viabilidade de trabalhar com uma denominação distinta, de forma a reduzir o risco de conflito com os registros já existentes e aumentar as chances de deferimento do pedido junto ao INPI.') +
    buildConsideracoes(obs) +
    buildImportante(false) + buildFooterComAnt();
}

// ── MAIN GENERATE FUNCTION ──

function gerarParecer(){
  syncFromDOM();
  var marca = (document.getElementById('parecer-marca')||{}).value || '';
  marca = marca.trim();
  if(!marca){ alert('Informe o nome da marca.'); return; }

  var ct = buildClassesText();
  var ch = buildClassesHTML();
  var ah = buildAntsHTML();
  var sh = buildSugsHTML();
  var obs = (document.getElementById('parecer-obs')||{}).value || '';

  var emailHTML = '';
  switch(_tpl){
    case 'sem-ant':    emailHTML = tpl_semAnt(marca, ct, ch, obs); break;
    case 'com-comp':   emailHTML = tpl_comComp(marca, ct, ch, ah, sh, obs); break;
    case 'exata':      emailHTML = tpl_exata(marca, ct, ch, ah, obs); break;
    case 'classe-alt': emailHTML = tpl_classeAlt(marca, ct, ch, ah, obs); break;
    case 'inviavel':   emailHTML = tpl_inviavel(marca, ct, ch, ah, obs); break;
  }

  var wrapper = '<div style="font-family:Tahoma,sans-serif;font-size:11pt;line-height:1.6;color:#000000;max-width:720px;">'+emailHTML+'<\/div>';

  document.getElementById('parecer-preview').innerHTML =
    '<div class="glass" style="padding:24px;margin-top:20px;">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">' +
    '<span class="email-title">PREVIEW DO RESULTADO</span>' +
    '<button class="btn-copy" onclick="copyParecer()">Copiar para email</button>' +
    '<\/div>' +
    '<div id="parecer-html-preview" style="background:#ffffff;padding:24px 32px;border-radius:8px;color:#000;border:1px solid rgba(255,255,255,0.12);">' +
    wrapper + '<\/div><\/div>';
}

function copyParecer(){
  var el = document.getElementById('parecer-html-preview');
  if(!el) return;
  var btn = document.querySelector('#parecer-preview .btn-copy');
  function flash(){ if(btn){btn.textContent='✓ Copiado!';btn.classList.add('ok');setTimeout(function(){btn.textContent='Copiar para email';btn.classList.remove('ok');},2500);} }
  try {
    var blob = new Blob([el.innerHTML], {type:'text/html'});
    navigator.clipboard.write([new ClipboardItem({'text/html':blob})]).then(flash);
  } catch(e){
    navigator.clipboard.writeText(el.innerText).then(flash);
  }
}

document.addEventListener('DOMContentLoaded', function(){
  renderClassesList();
  renderAntList();
  renderSugList();
});
